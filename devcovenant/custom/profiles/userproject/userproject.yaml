version: 1
profile: userproject
category: application
suffixes: []
ignore_dirs: []
assets:
  - path: .github/workflows/publish.yml
    template: publish.yml
project-governance:
  project_name: webcam-micro
  project_description: >-
    Cross-platform microscope camera application distributed as a Python
    package on PyPI.
  stage: prototype
  maintenance_stance: active
  compatibility_policy: forward-only
  versioning_mode: versioned
ci_and_test:
  jobs:
    build:
      name: Build
      needs: governance
      runs-on: ubuntu-latest
      permissions:
        contents: read
      steps:
        - name: Checkout
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        - name: Set up Python
          uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
          with:
            python-version: '3.11'
        - name: Configure Python cache root
          run: |
            echo "PYTHONPYCACHEPREFIX=$RUNNER_TEMP/devcovenant-pycache" \
              >> "$GITHUB_ENV"
        - name: Clean local build artifacts
          run: |
            rm -rf build dist ./*.egg-info .pytest_cache .ruff_cache
        - name: Install build tooling
          run: |
            python -m pip install -r requirements.lock
            python -m pip install twine==6.2.0
        - name: Build distributions
          run: python -m build
        - name: Validate distributions
          run: python -m twine check dist/*
        - name: Generate build provenance
          env:
            CI_RUN_ID: ${{ github.run_id }}
            CI_RUN_ATTEMPT: ${{ github.run_attempt }}
            CI_HEAD_SHA: ${{ github.sha }}
          run: |
            mkdir -p artifacts/provenance
            python - <<'PY'
            import hashlib
            import json
            import os
            from pathlib import Path

            def sha256_for(path: Path) -> str:
                digest = hashlib.sha256()
                digest.update(path.read_bytes())
                return digest.hexdigest()

            dist_files = sorted(
                path for path in Path("dist").glob("*") if path.is_file()
            )
            payload = {
                "workflow": "CI",
                "job": "Build",
                "ci_run_id": os.environ["CI_RUN_ID"],
                "ci_run_attempt": os.environ["CI_RUN_ATTEMPT"],
                "head_sha": os.environ["CI_HEAD_SHA"],
                "distributions": [
                    {
                        "name": path.name,
                        "sha256": sha256_for(path),
                    }
                    for path in dist_files
                ],
            }
            Path("artifacts/provenance/build-provenance.json").write_text(
                json.dumps(payload, indent=2) + "\n",
                encoding="utf-8",
            )
            PY
        - name: Upload distributions
          uses: "actions/upload-artifact@\
            bbbca2ddaa5d8feaa63e36b76fdaad77386f024f"
          with:
            name: webcam-micro-dist
            path: dist/*
        - name: Upload build provenance
          uses: "actions/upload-artifact@\
            bbbca2ddaa5d8feaa63e36b76fdaad77386f024f"
          with:
            name: webcam-micro-provenance
            path: artifacts/provenance/*.json
policy_overlays:
  package-doc-sync:
    sync_pairs:
      - README.md=>webcam_micro/README.md
    omit_block_pairs:
      - "<!-- REPO-ONLY:BEGIN -->=><!-- REPO-ONLY:END -->"
    rewrite_repo_relative_links: true
  documentation-growth-tracking:
    user_visible_files:
      - webcam_micro/README.md
    doc_quality_files:
      - webcam_micro/README.md
  last-updated:
    allowed_globs:
      - webcam_micro/README.md
    required_globs:
      - webcam_micro/README.md
  line-length-limit:
    exclude_globs:
      - webcam_micro/licenses/*.txt
  version-sync:
    version_file: webcam_micro/VERSION
  version-governance:
    scheme: pep440
    version_file: webcam_micro/VERSION
  dependency-management:
    license_source_overrides:
      - id: pyside6
        kind: archive_url
        url: https://download.qt.io/official_releases/QtForPython/pyside6/PySide6-{version}-src/pyside-setup-everywhere-src-{version}.tar.xz
        member_globs:
          - pyside-setup-everywhere-src-{version}/LICENSES/GPL-2.0-only.txt
          - pyside-setup-everywhere-src-{version}/LICENSES/GPL-3.0-only.txt
          - pyside-setup-everywhere-src-{version}/LICENSES/LGPL-3.0-only.txt
    surfaces:
      - id: root_workspace
        direct_dependency_files:
          - requirements.in
          - webcam_micro/runtime-requirements.lock
        dependency_files:
          - requirements.in
          - devcovenant/runtime-requirements.lock
          - webcam_micro/runtime-requirements.lock
        required_paths:
          - requirements.in
          - devcovenant/runtime-requirements.lock
          - webcam_micro/runtime-requirements.lock
        hash_targets:
          - id: linux-py311
            marker: sys_platform == "linux" and python_version == "3.11"
            pip:
              platform: manylinux_2_34_x86_64
              implementation: cp
              python_version: '3.11'
              abi: cp311
          - id: linux-py312
            marker: sys_platform == "linux" and python_version == "3.12"
            pip:
              platform: manylinux_2_34_x86_64
              implementation: cp
              python_version: '3.12'
              abi: cp312
          - id: linux-py313
            marker: sys_platform == "linux" and python_version == "3.13"
            pip:
              platform: manylinux_2_34_x86_64
              implementation: cp
              python_version: '3.13'
              abi: cp313
          - id: linux-py314
            marker: sys_platform == "linux" and python_version == "3.14"
            pip:
              platform: manylinux_2_34_x86_64
              implementation: cp
              python_version: '3.14'
              abi: cp314
          - id: windows-py311
            marker: sys_platform == "win32" and python_version == "3.11"
            pip:
              platform: win_amd64
              implementation: cp
              python_version: '3.11'
              abi: cp311
          - id: windows-py312
            marker: sys_platform == "win32" and python_version == "3.12"
            pip:
              platform: win_amd64
              implementation: cp
              python_version: '3.12'
              abi: cp312
          - id: windows-py313
            marker: sys_platform == "win32" and python_version == "3.13"
            pip:
              platform: win_amd64
              implementation: cp
              python_version: '3.13'
              abi: cp313
          - id: windows-py314
            marker: sys_platform == "win32" and python_version == "3.14"
            pip:
              platform: win_amd64
              implementation: cp
              python_version: '3.14'
              abi: cp314
          - id: macos-py311
