version: 1
profile: php
category: language
suffixes:
  - .php
ignore_dirs:
  - vendor
clean_overlays:
  cache_dirs:
    - .phpunit.cache
assets:
  - path: composer.json
    template: composer.json
  - path: composer.lock
    template: composer.lock
  - path: phpunit.xml
    template: phpunit.xml
translators:
  - id: php
    extensions:
      - .php
    can_handle:
      strategy: module_function
      entrypoint: php_translator.py:can_handle
    translate:
      strategy: module_function
      entrypoint: php_translator.py:translate
policy_overlays:
  dependency-management:
    dependency_role_files:
      - intent=>composer.json
      - resolved=>composer.lock
  documentation-growth-tracking:
    user_facing_suffixes:
      - .php
    user_facing_keywords:
      - controller
      - controllers
      - service
      - services
      - route
      - routes
      - endpoint
      - endpoints
  line-length-limit:
    include_suffixes:
      - .php
workflow_runs:
  - id: tests
    enabled: true
    after: mid
    before: end
    order: 100
    runner:
      kind: command_group
      commands:
        - phpunit
    success_contract:
      kind: all_commands_exit_zero
    recording:
      record_in_session: true
      summary_label: Tests
      output_mode_config_field: engine.tests_output_mode
      event_adapter_group: run_events
      write_runtime_profile: true
