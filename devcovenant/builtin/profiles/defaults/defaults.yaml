    required_globs:
      - README.md
      - AGENTS.md
      - CONTRIBUTING.md
      - CHANGELOG.md
      - SPEC.md
      - PLAN.md
  line-length-limit:
    max_length: 79
    allow_long_url_lines: true
    url_prefixes:
      - 'https://'
      - 'http://'
      - 'ftp://'
      - 'ftps://'
      - 'sftp://'
      - 'ssh://'
      - 'ws://'
      - 'wss://'
      - 'file://'
      - 'git://'
      - 'svn://'
      - 'mailto:'
      - 'tel:'
      - 'magnet:'
      - 'torrent:'
      - 'data:'
      - 'urn:'
    allow_long_lines: true
    long_lines_contain: []
    long_lines_between: []
    include_suffixes:
      - .py
      - .md
      - .rst
      - .txt
      - .yml
      - .yaml
      - .json
      - .toml
      - .cff
    include_globs:
      - '*.py'
      - '*.md'
      - '*.rst'
      - '*.txt'
      - '*.yml'
      - '*.yaml'
      - '*.json'
      - '*.toml'
      - '*.cff'
    exclude_prefixes:
      - build
      - dist
      - node_modules
    exclude_globs:
      - build/**
      - dist/**
      - node_modules/**
      - '*.egg-info/**'
      - '**/*.egg-info/**'
  name-clarity:
    exclude_prefixes:
      - build
      - dist
      - node_modules
    exclude_globs:
      - build/**
      - dist/**
      - node_modules/**
  security-scanner:
    exclude_globs:
      - tests/**
      - '**/tests/**'
  no-raw-errors:
    include_suffixes:
      - .py
    include_globs:
      - '*.py'
    exclude_prefixes:
      - build
      - dist
      - node_modules
    exclude_globs:
      - build/**
      - dist/**
      - node_modules/**
    forbid_bare_except: true
    forbid_raise_exception: true
    forbid_broad_exception_handlers: true
    forbid_silent_exception_pass: true
    broad_exception_waiver_markers:
      - DEVCOV_ALLOW_BROAD_ONCE
    broad_exception_waiver_between:
      - DEVCOV_BROAD_BEGIN=>DEVCOV_BROAD_END
  modules-need-tests:
    exclude_prefixes:
      - build
      - dist
      - node_modules
      - tests
    watch_dirs:
      - tests
    tests_watch_dirs:
      - tests
  tests-coverage:
    exclude_prefixes:
      - build
      - dist
      - node_modules
      - tests
    watch_dirs:
      - tests
    tests_watch_dirs:
      - tests
  managed-environment:
    expected_paths:
      - .venv
    expected_interpreters:
      - .venv/bin/python
      - .venv/Scripts/python.exe
    required_commands:
      - pre-commit
      - pytest
    manual_commands:
      - '{current_python} -m venv .venv'
      - '{managed_python} -m pip install -r requirements.lock'
    managed_commands:
      - start=>{current_python} -m venv .venv
      - start=>{managed_python} -m pip install -r requirements.lock
project-governance:
  changelog_file: CHANGELOG.md
  unversioned_label: Unversioned
  unreleased_heading: '## Unreleased'
  allowed_stages:
    - prototype
    - alpha
    - beta
    - stable
    - deprecated
    - archived
  allowed_maintenance_stances:
    - active
    - maintenance
    - frozen
    - sunset
