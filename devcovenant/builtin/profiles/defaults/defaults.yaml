version: 1
profile: defaults
category: core
suffixes: []
ignore_dirs: []
policy_overlays:
  documentation-growth-tracking:
    user_facing_files:
      - .pre-commit-config.yaml
      - pyproject.toml
    user_facing_globs:
      - .github/workflows/*.yml
      - .github/workflows/*.yaml
    user_facing_exclude_prefixes:
      - tests
    user_facing_exclude_dirs:
      - tests/**
    user_facing_suffixes:
      - .py
      - .js
      - .ts
      - .tsx
      - .vue
      - .go
      - .rs
      - .java
      - .kt
      - .swift
      - .rb
      - .php
      - .cs
      - .yml
      - .yaml
      - .json
      - .toml
    user_visible_files:
      - README.md
      - CONTRIBUTING.md
      - AGENTS.md
      - SPEC.md
      - PLAN.md
    doc_quality_files:
      - README.md
      - CONTRIBUTING.md
      - AGENTS.md
      - SPEC.md
      - PLAN.md
  version-sync:
    version_file: VERSION
    changelog_file: CHANGELOG.md
    changelog_header_prefix: '## Version'
    target_roles:
      - docs
      - changelog
    role_extractors:
      - docs=>project_version_line
      - changelog=>changelog_header_version
    target_role_files:
      - docs=>README.md
      - docs=>AGENTS.md
      - docs=>CONTRIBUTING.md
      - docs=>SPEC.md
      - docs=>PLAN.md
      - changelog=>CHANGELOG.md
    target_role_globs: []
    target_role_dirs: []
  version-governance:
    enforce_bumping: true
    canonical_versions_required: false
    version_file: VERSION
    changelog_file: CHANGELOG.md
    changelog_header_prefix: '## Version'
    pep440_allow_prereleases: true
    pep440_allow_dev_releases: true
    pep440_allow_post_releases: true
  last-updated:
    include_suffixes:
      - .md
    include_globs:
      - '*.md'
    allowed_globs:
      - README.md
      - AGENTS.md
      - CONTRIBUTING.md
      - CHANGELOG.md
      - SPEC.md
      - PLAN.md
    required_globs:
      - README.md
      - AGENTS.md
      - CONTRIBUTING.md
      - CHANGELOG.md
      - SPEC.md
      - PLAN.md
  changelog-coverage:
    main_changelog:
      - CHANGELOG.md
    skipped_files:
      - CHANGELOG.md
      - .gitignore
      - .pre-commit-config.yaml
      - .github/workflows/ci.yml
    header_doc_suffixes:
      - .md
      - .rst
      - .txt
    header_keys:
      - Last Updated
      - Project Version
      - Project Stage
      - Maintenance Stance
      - Compatibility Policy
      - Versioning Mode
      - Project Codename
      - Build Identity
      - DevCovenant Version
    header_scan_lines: 4
    summary_labels:
      - Change
      - Why
      - Impact
    gate_status_file: devcovenant/registry/runtime/gate_status.json
    summary_verbs:
      - add
      - added
      - address
      - addressed
      - adjust
      - adjusted
      - align
      - aligned
      - amend
      - amended
      - automate
      - automated
