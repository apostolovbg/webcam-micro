base_fragments:
  # Editor settings
  - .idea/
  - .vscode/
  - '*.swp'
  - '*.swo'
  - '*.swn'
  - '*.tmp'
  - '*.bak'

  # Environment files
  - .env
  - .env.*
  - '!.env.example'

  # Build artifacts
  - build/
  - dist/
  - out/
  - coverage/
  - htmlcov/
  - reports/
  - '*.egg-info/'
  - pip-wheel-metadata/

  # Logs
  - '*.log'

  # Misc
  - .venv/
  - .python/
  - __pycache__/
  - .pytest_cache/
  - .mypy_cache/
  - .tox/
  - .nox/
  - .hypothesis/
  - .coverage
  - .coverage.*
  - .cache/
  - .ruff_cache/
  - tmp/
  - temp/

  # DevCovenant
  - devcovenant/registry/runtime/
  - devcovenant/logs/**
  - '!devcovenant/logs/'
  - '!devcovenant/logs/README.md'

os_fragments:
  # macOS
  - .DS_Store
  - .AppleDouble
  - .LSOverride
  - Icon
  - '._*'
  - .Spotlight-V100
  - .Trashes
  - .fseventsd
  - .AppleDB
  - .AppleDesktop
  - Network Trash Folder
  - Temporary Items

  # Windows
  - Thumbs.db
  - Desktop.ini
  - ehthumbs.db
  - Icon?
  - '*.lnk'
  - $RECYCLE.BIN/

  # Linux
  - .directory
  - .Trash-*
  - .fuse_hidden*
  - '.nfs*'
