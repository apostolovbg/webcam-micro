  {{ PROJECT_DESCRIPTION_PARAGRAPH }}

  ## Overview
  Use this README as the operator entrypoint for the repository.
  Describe the project this repository ships, what problem it solves, and what
  contributors or operators should do first.

  If you already drafted DevCovenant-shaped docs, review them before replacing
  useful authored content with a fresh template body.

  Keep this document practical.
  It should orient someone quickly and point them to deeper docs without
  turning into the whole handbook.

  ## Quick Start
  Give the shortest correct setup and first-use sequence.
  Include the commands a contributor or operator should actually run first.

  If the repository uses DevCovenant-managed lifecycle commands, explain the
  install/review/deploy boundary plainly and list the standard gate sequence.

  ## Workflow
  Describe the normal edit, run, and review routine for this
  repository.
  Prefer an explicit command sequence over vague prose.

  ## Configuration Checkpoints
  Call out the few settings or files a human must review consciously.
  Prefer short explanations of what each checkpoint controls.
  For most repositories, keep `devcovuser` active and add a repository-specific
  custom profile on top when the repository needs its own reusable rules,
  assets, or workflow additions.

  ## Docs Map
  List the smaller set of deeper docs and say what each one is for.
  Keep the descriptions concrete so the reader knows which page to open next.

  ## Security, Privacy, and Support
  Point readers at the trust-surface docs that matter for the repository.

  ## License
  Document the repository licensing terms here.
