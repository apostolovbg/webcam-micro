version: 1
profile: swift
category: language
suffixes:
  - .swift
ignore_dirs:
  - .build
clean_overlays:
  build_dirs:
    - .build
assets:
  - path: Package.swift
    template: Package.swift
translators:
  - id: swift
    extensions:
      - .swift
    can_handle:
      strategy: module_function
      entrypoint: swift_translator.py:can_handle
    translate:
      strategy: module_function
      entrypoint: swift_translator.py:translate
policy_overlays:
  dependency-management:
    dependency_role_files:
      - package_manifest=>Package.swift
  documentation-growth-tracking:
    user_facing_suffixes:
      - .swift
  line-length-limit:
    include_suffixes:
      - .swift
workflow_runs:
  - id: tests
    enabled: true
    after: mid
    before: end
    order: 100
    runner:
      kind: command_group
      commands:
        - swift test
    success_contract:
      kind: all_commands_exit_zero
    recording:
      record_in_session: true
      summary_label: Tests
      output_mode_config_field: engine.tests_output_mode
      event_adapter_group: run_events
      write_runtime_profile: true
