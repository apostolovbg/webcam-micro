version: 1
profile: csharp
category: language
suffixes:
  - .cs
ignore_dirs:
  - bin
  - obj
clean_overlays:
  build_dirs:
    - bin
    - obj
assets:
  - path: Project.csproj
    template: Project.csproj
pre_commit:
  repos:
    - repo: local
      hooks:
        - id: csharp-format
          name: csharp format check
          entry: dotnet format --verify-no-changes
          language: system
          pass_filenames: false
          files: \.cs$
translators:
  - id: csharp
    extensions:
      - .cs
    can_handle:
      strategy: module_function
      entrypoint: csharp_translator.py:can_handle
    translate:
      strategy: module_function
      entrypoint: csharp_translator.py:translate
policy_overlays:
  dependency-management:
    dependency_role_files:
      - package_manifest=>Project.csproj
      - resolved=>packages.lock.json
  name-clarity:
    include_suffixes:
      - .cs
  docstring-and-comment-coverage:
    include_suffixes:
      - .cs
  modules-need-tests:
    include_suffixes:
      - .cs
  security-scanner:
    include_suffixes:
      - .cs
  documentation-growth-tracking:
    user_facing_suffixes:
      - .cs
    user_facing_keywords:
      - controller
      - controllers
      - service
      - services
      - endpoint
      - endpoints
      - handler
      - handlers
  line-length-limit:
    include_suffixes:
      - .cs
workflow_runs:
  - id: tests
    enabled: true
    after: mid
    before: end
    order: 100
    runner:
      kind: command_group
      commands:
        - dotnet test
    success_contract:
      kind: all_commands_exit_zero
    recording:
      record_in_session: true
      summary_label: Tests
      output_mode_config_field: engine.tests_output_mode
      event_adapter_group: run_events
      write_runtime_profile: true
