version: 1
profile: javascript
category: language
suffixes:
  - .js
  - .jsx
  - .mjs
  - .cjs
ignore_dirs:
  - node_modules
  - dist
  - build
  - coverage
  - .cache
clean_overlays:
  cache_dirs:
    - coverage
    - .parcel-cache
    - .next
    - .nuxt
    - .svelte-kit
    - .turbo
assets:
  - path: package.json
    template: package.json
pre_commit:
  repos:
    - repo: https://github.com/pre-commit/mirrors-prettier
      rev: v3.3.3
      hooks:
        - id: prettier
          files: \.(js|jsx|mjs|cjs)$
translators:
  - id: javascript
    extensions:
      - .js
      - .jsx
      - .mjs
      - .cjs
    can_handle:
      strategy: module_function
      entrypoint: javascript_translator.py:can_handle
    translate:
      strategy: module_function
      entrypoint: javascript_translator.py:translate
policy_overlays:
  dependency-management:
    dependency_role_files:
      - intent=>package.json
      - resolved=>package-lock.json
      - resolved=>yarn.lock
      - resolved=>pnpm-lock.yaml
  name-clarity:
    include_suffixes:
      - .js
      - .jsx
      - .mjs
      - .cjs
  docstring-and-comment-coverage:
    include_suffixes:
      - .js
      - .jsx
      - .mjs
      - .cjs
  modules-need-tests:
    include_suffixes:
      - .js
      - .jsx
    watch_dirs:
      - tests
    tests_watch_dirs:
      - tests
    mirror_test_name_templates:
      - javascript=>{stem}.test.js
      - javascript=>{stem}.spec.js
      - javascript=>test_{stem}.js
      - javascript=>{stem}.test.jsx
      - javascript=>{stem}.spec.jsx
  tests-coverage:
    include_suffixes:
      - .js
      - .jsx
    watch_dirs:
      - tests
    tests_watch_dirs:
      - tests
    assertion_signal_patterns:
      - javascript=>\bexpect\s*\(
      - javascript=>\bassert(?:\.[A-Za-z_]+)?\s*\(
    tautology_patterns:
      - javascript=>^\s*assert\s*\(\s*true\s*\)\s*;?\s*$
      - javascript=>^\s*expect\s*\(\s*true\s*\)\s*$
    symbol_kinds:
      - function
      - class
    symbol_name_min_length: 3
    symbol_assertion_window: 2
  security-scanner:
    include_suffixes:
      - .js
      - .jsx
      - .mjs
      - .cjs
  documentation-growth-tracking:
    user_facing_suffixes:
      - .js
      - .jsx
      - .mjs
      - .cjs
    user_facing_keywords:
      - api
      - endpoint
      - endpoints
      - route
      - routes
      - controller
      - controllers
      - handler
      - handlers
      - component
      - components
  line-length-limit:
    include_suffixes:
      - .js
      - .jsx
      - .mjs
      - .cjs
  no-print-outside-output-runtime:
    sink_attr_targets:
      - javascript=>console.log
      - javascript=>console.info
      - javascript=>console.warn
      - javascript=>console.error
workflow_runs:
  - id: tests
    enabled: true
    after: mid
    before: end
    order: 100
    runner:
      kind: command_group
      commands:
        - npm test
    success_contract:
      kind: all_commands_exit_zero
    recording:
      record_in_session: true
      summary_label: Tests
      output_mode_config_field: engine.tests_output_mode
      event_adapter_group: run_events
      write_runtime_profile: true
