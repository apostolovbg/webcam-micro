version: 1
profile: dart
category: language
suffixes:
  - .dart
ignore_dirs:
  - .dart_tool
  - build
clean_overlays:
  build_dirs:
    - .dart_tool
assets:
  - path: pubspec.yaml
    template: pubspec.yaml
  - path: pubspec.lock
    template: pubspec.lock
translators:
  - id: dart
    extensions:
      - .dart
    can_handle:
      strategy: module_function
      entrypoint: dart_translator.py:can_handle
    translate:
      strategy: module_function
      entrypoint: dart_translator.py:translate
policy_overlays:
  dependency-management:
    dependency_role_files:
      - package_manifest=>pubspec.yaml
      - resolved=>pubspec.lock
  documentation-growth-tracking:
    user_facing_suffixes:
      - .dart
  line-length-limit:
    include_suffixes:
      - .dart
workflow_runs:
  - id: tests
    enabled: true
    after: mid
    before: end
    order: 100
    runner:
      kind: command_group
      commands:
        - dart test
    success_contract:
      kind: all_commands_exit_zero
    recording:
      record_in_session: true
      summary_label: Tests
      output_mode_config_field: engine.tests_output_mode
      event_adapter_group: run_events
      write_runtime_profile: true
