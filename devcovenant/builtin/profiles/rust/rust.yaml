version: 1
profile: rust
category: language
suffixes:
  - .rs
ignore_dirs:
  - target
clean_overlays:
  build_dirs:
    - target
assets:
  - path: Cargo.toml
    template: Cargo.toml
  - path: Cargo.lock
    template: Cargo.lock
pre_commit:
  repos:
    - repo: https://github.com/doublify/pre-commit-rust
      rev: v1.0
      hooks:
        - id: fmt
        - id: cargo-check
translators:
  - id: rust
    extensions:
      - .rs
    can_handle:
      strategy: module_function
      entrypoint: rust_translator.py:can_handle
    translate:
      strategy: module_function
      entrypoint: rust_translator.py:translate
policy_overlays:
  dependency-management:
    dependency_role_files:
      - package_manifest=>Cargo.toml
      - resolved=>Cargo.lock
  name-clarity:
    include_suffixes:
      - .rs
  docstring-and-comment-coverage:
    include_suffixes:
      - .rs
  modules-need-tests:
    include_suffixes:
      - .rs
    watch_dirs:
      - tests
    tests_watch_dirs:
      - tests
    mirror_test_name_templates:
      - rust=>{stem}_test.rs
      - rust=>tests/{stem}.rs
  tests-coverage:
    include_suffixes:
      - .rs
    watch_dirs:
      - tests
    tests_watch_dirs:
      - tests
    assertion_signal_patterns:
      - rust=>\bassert!\s*\(
      - rust=>\bassert_eq!\s*\(
      - rust=>\bassert_ne!\s*\(
    tautology_patterns:
      - rust=>^\s*assert!\s*\(\s*true\s*\)\s*;?\s*$
      - rust=>^\s*assert_eq!\s*\(\s*([A-Za-z_][A-Za-z0-9_]*)\s*,\s*\1\)\s*$
    symbol_kinds:
      - function
      - struct
    symbol_name_min_length: 3
    symbol_assertion_window: 2
  security-scanner:
    include_suffixes:
      - .rs
  documentation-growth-tracking:
    user_facing_suffixes:
      - .rs
    user_facing_keywords:
      - handler
      - handlers
      - endpoint
      - endpoints
      - service
      - services
  line-length-limit:
    include_suffixes:
      - .rs
  no-print-outside-output-runtime:
    sink_macro_targets:
      - rust=>println
      - rust=>eprintln
workflow_runs:
  - id: tests
    enabled: true
    after: mid
    before: end
    order: 100
    runner:
      kind: command_group
      commands:
        - cargo test
    success_contract:
      kind: all_commands_exit_zero
    recording:
      record_in_session: true
      summary_label: Tests
      output_mode_config_field: engine.tests_output_mode
      event_adapter_group: run_events
      write_runtime_profile: true
